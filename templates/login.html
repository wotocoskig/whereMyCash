{% extends "base.html" %}
{% block title %}Entrar — wheresMyCash{% endblock %}

{% block conteudo %}
<div class="card" style="max-width: 380px; margin: 24px auto;">
    <h3 class="sec-h"><i class="ti ti-login-2"></i> Entrar</h3>
    <p class="sec-sub">Acesse seu controle de gastos.</p>

    <form action="{{ url_for('login') }}" method="POST">
        <input type="hidden" name="csrf" value="{{ csrf }}">
        <label for="username">Usuário</label>
        <input type="text" id="username" name="username" value="{{ username or '' }}" required autofocus>

        <label for="senha">Senha</label>
        <div class="senha-wrap">
            <input type="password" id="senha" name="senha" required>
            <button type="button" class="ver-senha" onclick="verSenha(this)" aria-label="Mostrar senha"><i class="ti ti-eye"></i></button>
        </div>

        <button type="submit" class="btn" style="margin-top: 14px;">Entrar</button>
    </form>

    <p class="muted" style="text-align: center; margin: 16px 0 0;">
        Não tem conta? <a class="link" href="{{ url_for('registrar') }}">Criar conta</a>
    </p>
</div>
{% endblock %}
