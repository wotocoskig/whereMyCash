{% extends "base.html" %}
{% block title %}Entrar — wheresMyCash{% endblock %}

{% block conteudo %}
<div class="card" style="max-width: 380px; margin: 40px auto;">
    <h1 style="font-size: 22px;">Entrar 👋</h1>
    <p class="muted" style="margin-top: -8px;">Acesse seu controle de gastos.</p>

    <form action="{{ url_for('login') }}" method="POST">
        <label for="username">Usuário</label>
        <input type="text" id="username" name="username" value="{{ username or '' }}" required autofocus>

        <label for="senha">Senha</label>
        <div class="senha-wrap">
            <input type="password" id="senha" name="senha" required>
            <button type="button" class="ver-senha" onclick="verSenha(this)" aria-label="Mostrar senha">👁️</button>
        </div>

        <button type="submit" class="btn" style="margin-top: 12px;">Entrar</button>
    </form>

    <p class="muted" style="text-align: center; margin-bottom: 0;">
        Não tem conta? <a class="link" href="{{ url_for('registrar') }}">Criar conta</a>
    </p>
</div>
{% endblock %}
