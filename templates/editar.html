{% extends "base.html" %}
{% block title %}Editar lançamento{% endblock %}

{% block conteudo %}
<div class="card" style="max-width: 420px; margin: 20px auto;">
    <h1 style="font-size: 22px;">✏️ Editar lançamento</h1>

    <form action="/editar/{{ t.id }}" method="POST">
        <!-- Seletor de tipo: dois botões -->
        <div class="toggle-tipo">
            <input type="radio" name="tipo" id="tipo-gasto" value="DESPESA"
                   {% if t.tipo == 'DESPESA' %}checked{% endif %} onchange="toggleForma()">
            <label for="tipo-gasto" class="opt opt-gasto">➖ Gasto</label>
            <input type="radio" name="tipo" id="tipo-ganho" value="RECEITA"
                   {% if t.tipo == 'RECEITA' %}checked{% endif %} onchange="toggleForma()">
            <label for="tipo-ganho" class="opt opt-ganho">➕ Ganho</label>
        </div>

        <label for="descricao">Descrição</label>
        <input type="text" id="descricao" name="descricao" value="{{ t.descricao }}" required>

        <label for="valor">Valor</label>
        <input type="text" inputmode="decimal" id="valor" name="valor" value="{{ t.valor|moeda }}" required>

        <label for="categoria">Categoria</label>
        <input type="text" id="categoria" name="categoria" value="{{ t.categoria }}"
               list="lista-categorias" required>
        <datalist id="lista-categorias">
            {% for c in categorias %}
                <option value="{{ c }}"></option>
            {% endfor %}
        </datalist>

        <label for="detalhes">Detalhes (opcional)</label>
        <textarea id="detalhes" name="detalhes" rows="2" placeholder="O que você comprou?">{{ t.detalhes or '' }}</textarea>

        <label for="data">Data</label>
        <input type="date" id="data" name="data" value="{{ t.data }}" required>

        <div id="campoForma">
            <label for="forma">Forma de pagamento</label>
            <select id="forma" name="forma">
                <option value="DEBITO" {% if t.forma != 'CREDITO' %}selected{% endif %}>Débito (já pago)</option>
                <option value="CREDITO" {% if t.forma == 'CREDITO' %}selected{% endif %}>Crédito (a pagar)</option>
            </select>
        </div>

        <button type="submit" class="btn" style="margin-top: 12px;">Salvar alterações</button>
    </form>

    <p style="text-align: center; margin-bottom: 0;">
        <a class="link" href="/">← Voltar sem salvar</a>
    </p>
</div>

<script>
    // Mostra a forma de pagamento só quando o tipo é Gasto.
    function toggleForma() {
        var ehGasto = document.getElementById('tipo-gasto').checked;
        document.getElementById('campoForma').style.display = ehGasto ? 'block' : 'none';
    }
    toggleForma();
</script>
{% endblock %}
