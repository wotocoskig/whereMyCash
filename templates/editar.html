{% extends "base.html" %}
{% block title %}Editar lançamento{% endblock %}

{% block conteudo %}
<div class="card" style="max-width: 420px; margin: 20px auto;">
    <h1 style="font-size: 22px;">✏️ Editar lançamento</h1>

    <form action="/editar/{{ t.id }}" method="POST">
        <label for="descricao">Descrição</label>
        <input type="text" id="descricao" name="descricao" value="{{ t.descricao }}" required>

        <label for="valor">Valor</label>
        <input type="number" id="valor" step="0.01" name="valor" value="{{ "%.2f"|format(t.valor) }}" required>

        <label for="categoria">Categoria</label>
        <input type="text" id="categoria" name="categoria" value="{{ t.categoria }}" required>

        <label for="data">Data</label>
        <input type="date" id="data" name="data" value="{{ t.data }}" required>

        <label for="tipo">Tipo</label>
        <select id="tipo" name="tipo" onchange="toggleForma()">
            <option value="DESPESA" {% if t.tipo == 'DESPESA' %}selected{% endif %}>Gasto</option>
            <option value="RECEITA" {% if t.tipo == 'RECEITA' %}selected{% endif %}>Ganho</option>
        </select>

        <div id="campoForma">
            <label for="forma">Forma de pagamento</label>
            <select id="forma" name="forma">
                <option value="DEBITO" {% if t.forma != 'CREDITO' %}selected{% endif %}>Débito (já pago)</option>
                <option value="CREDITO" {% if t.forma == 'CREDITO' %}selected{% endif %}>Crédito (a pagar)</option>
            </select>
        </div>

        <button type="submit" class="btn" style="margin-top: 12px;">Salvar alterações</button>
    </form>

    <p style="text-align: center; margin-bottom: 0;">
        <a class="link" href="/">← Voltar sem salvar</a>
    </p>
</div>

<script>
    // Mostra a forma de pagamento só quando o tipo é Gasto.
    function toggleForma() {
        var tipo = document.getElementById('tipo').value;
        document.getElementById('campoForma').style.display = (tipo === 'DESPESA') ? 'block' : 'none';
    }
    toggleForma();
</script>
{% endblock %}
