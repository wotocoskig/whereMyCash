{% extends "base.html" %}
{% block title %}Editar lançamento{% endblock %}

{% block conteudo %}
<div class="card" style="max-width: 420px; margin: 20px auto;">
    <h1 style="font-size: 22px;">✏️ Editar lançamento</h1>

    <form action="/editar/{{ t.id }}" method="POST">
        <label for="descricao">Descrição</label>
        <input type="text" id="descricao" name="descricao" value="{{ t.descricao }}" required>

        <label for="valor">Valor</label>
        <input type="number" id="valor" step="0.01" name="valor" value="{{ "%.2f"|format(t.valor) }}" required>

        <label for="categoria">Categoria</label>
        <input type="text" id="categoria" name="categoria" value="{{ t.categoria }}" required>

        <label for="data">Data</label>
        <input type="date" id="data" name="data" value="{{ t.data }}" required>

        <label for="tipo">Tipo</label>
        <select id="tipo" name="tipo">
            <option value="DESPESA" {% if t.tipo == 'DESPESA' %}selected{% endif %}>Despesa</option>
            <option value="RECEITA" {% if t.tipo == 'RECEITA' %}selected{% endif %}>Receita</option>
        </select>

        <button type="submit" class="btn" style="margin-top: 12px;">Salvar alterações</button>
    </form>

    <p style="text-align: center; margin-bottom: 0;">
        <a class="link" href="/">← Voltar sem salvar</a>
    </p>
</div>
{% endblock %}
