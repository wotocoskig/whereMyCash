{% extends "base.html" %}
{% block title %}Trocar senha{% endblock %}

{% block conteudo %}
<div class="card" style="max-width: 420px; margin: 20px auto;">
    <h1 style="font-size: 22px;">🔑 Trocar senha</h1>

    <form action="{{ url_for('trocar_senha') }}" method="POST">
        <input type="hidden" name="csrf" value="{{ csrf }}">
        <label for="atual">Senha atual</label>
        <div class="senha-wrap">
            <input type="password" id="atual" name="atual" required autofocus>
            <button type="button" class="ver-senha" onclick="verSenha(this)" aria-label="Mostrar senha">👁️</button>
        </div>

        <label for="nova">Nova senha</label>
        <div class="senha-wrap">
            <input type="password" id="nova" name="nova" minlength="4" required>
            <button type="button" class="ver-senha" onclick="verSenha(this)" aria-label="Mostrar senha">👁️</button>
        </div>

        <label for="nova2">Repita a nova senha</label>
        <div class="senha-wrap">
            <input type="password" id="nova2" name="nova2" minlength="4" required>
            <button type="button" class="ver-senha" onclick="verSenha(this)" aria-label="Mostrar senha">👁️</button>
        </div>

        <button type="submit" class="btn" style="margin-top: 12px;">Salvar nova senha</button>
    </form>

    <p style="text-align: center; margin-bottom: 0;">
        <a class="link" href="/">← Voltar</a>
    </p>
</div>
{% endblock %}
