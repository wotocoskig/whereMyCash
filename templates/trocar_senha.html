{% extends "base.html" %}
{% block title %}Trocar senha{% endblock %}

{% block conteudo %}
<div class="card" style="max-width: 420px; margin: 4px auto;">
    <h3 class="sec-h"><i class="ti ti-key"></i> Trocar senha</h3>
    <p class="sec-sub">Defina uma nova senha de acesso.</p>

    <form action="{{ url_for('trocar_senha') }}" method="POST">
        <input type="hidden" name="csrf" value="{{ csrf }}">
        <label for="atual">Senha atual</label>
        <div class="senha-wrap">
            <input type="password" id="atual" name="atual" required autofocus>
            <button type="button" class="ver-senha" onclick="verSenha(this)" aria-label="Mostrar senha"><i class="ti ti-eye"></i></button>
        </div>

        <label for="nova">Nova senha</label>
        <div class="senha-wrap">
            <input type="password" id="nova" name="nova" minlength="4" required>
            <button type="button" class="ver-senha" onclick="verSenha(this)" aria-label="Mostrar senha"><i class="ti ti-eye"></i></button>
        </div>

        <label for="nova2">Repita a nova senha</label>
        <div class="senha-wrap">
            <input type="password" id="nova2" name="nova2" minlength="4" required>
            <button type="button" class="ver-senha" onclick="verSenha(this)" aria-label="Mostrar senha"><i class="ti ti-eye"></i></button>
        </div>

        <button type="submit" class="btn" style="margin-top: 14px;">Salvar nova senha</button>
    </form>

    <p style="text-align: center; margin: 16px 0 0;">
        <a class="link" href="/">← Voltar</a>
    </p>
</div>
{% endblock %}
